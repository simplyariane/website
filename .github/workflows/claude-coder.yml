name: Claude Coder

on:
  issues:
    types: [opened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  code:
    if: "!contains(github.event.issue.labels.*.name, 'agent-fix')"
    uses: simplyariane/overseer/.github/workflows/claude-coder.reusable.yml@main
    with:
      issue_number: ${{ github.event.issue.number }}
      issue_title: ${{ github.event.issue.title }}
      issue_body: ${{ github.event.issue.body || '' }}
    secrets: inherit
